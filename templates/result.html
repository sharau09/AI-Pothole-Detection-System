<!DOCTYPE html>
<html>
<head>
    <title>Pothole Detection Result</title>
</head>
<body>

<h1>Detection Result</h1>

<img src="{{ url_for('static', filename='results/' + image) }}" width="800">

<h2>Detection Summary</h2>

<p><strong>Total Potholes Detected:</strong> {{ count }}</p>

{% endfor %}
</ul>

<a href="/">Upload Another Image</a>

</body>
</html>
